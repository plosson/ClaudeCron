name: Build & Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Import Application certificate
        env:
          P12_BASE64: ${{ secrets.DEVELOPER_ID_APPLICATION_P12 }}
          P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
        run: |
          echo "$P12_BASE64" | base64 --decode > /tmp/app.p12
          security create-keychain -p "" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "" build.keychain
          security import /tmp/app.p12 -k build.keychain \
            -P "$P12_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple: \
            -s -k "" build.keychain
          rm /tmp/app.p12

      - name: Install xcodegen
        run: brew install xcodegen

      - name: Build
        run: |
          cd ClaudeCron
          xcodegen generate
          cd ..
          VERSION=$(git describe --tags --abbrev=0 | sed 's/^v//')
          xcodebuild -project ClaudeCron/ClaudeCron.xcodeproj \
            -scheme ClaudeCron \
            -configuration Release \
            -derivedDataPath build/derived \
            -destination "platform=macOS" \
            build

          # Assemble .app bundle
          APP_SRC=$(find build/derived -name "Claude Cron.app" -type d | head -1)
          mkdir -p build/release
          cp -R "$APP_SRC" "build/release/Claude Cron.app"

      - name: Code sign
        run: |
          codesign --force --options runtime \
            --sign "Developer ID Application: SPRL Losson (427N276E3Q)" \
            --entitlements ClaudeCron/ClaudeCron/ClaudeCron.entitlements \
            --timestamp \
            "build/release/Claude Cron.app"

      - name: Create DMG
        run: |
          VERSION=$(git describe --tags --abbrev=0 | sed 's/^v//')
          hdiutil create -volname "Claude Cron" \
            -srcfolder "build/release/Claude Cron.app" \
            -ov -format UDZO \
            "build/ClaudeCron-${VERSION}.dmg"
          codesign --force --sign "Developer ID Application: SPRL Losson (427N276E3Q)" \
            --timestamp "build/ClaudeCron-${VERSION}.dmg"

      - name: Notarize
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          set +e
          xcrun notarytool submit build/ClaudeCron-*.dmg \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_APP_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait 2>&1 | tee /tmp/notarize.log
          RESULT=$?
          SUBMISSION_ID=$(grep -o '[0-9a-f\-]\{36\}' /tmp/notarize.log | head -1)
          if [ $RESULT -ne 0 ] || grep -q "status: Invalid" /tmp/notarize.log; then
            echo "::error::Notarization failed. Fetching log..."
            if [ -n "$SUBMISSION_ID" ]; then
              xcrun notarytool log "$SUBMISSION_ID" \
                --apple-id "$APPLE_ID" \
                --password "$APPLE_APP_PASSWORD" \
                --team-id "$APPLE_TEAM_ID" \
                /tmp/notarize-log.json 2>/dev/null
              cat /tmp/notarize-log.json 2>/dev/null || echo "Could not fetch log"
            fi
            exit 1
          fi
          xcrun stapler staple build/ClaudeCron-*.dmg

      - name: Upload artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ClaudeCron-dmg
          path: build/ClaudeCron-*.dmg

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: build/ClaudeCron-*.dmg
