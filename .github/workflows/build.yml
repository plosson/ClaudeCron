name: Build & Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Import Application certificate
        env:
          P12_BASE64: ${{ secrets.DEVELOPER_ID_APPLICATION_P12 }}
          P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
        run: |
          echo "$P12_BASE64" | base64 --decode > /tmp/app.p12
          security create-keychain -p "" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "" build.keychain
          security import /tmp/app.p12 -k build.keychain \
            -P "$P12_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple: \
            -s -k "" build.keychain
          rm /tmp/app.p12

      - name: Install tools
        run: brew install xcodegen create-dmg

      - name: Build
        run: |
          cd ClaudeCron
          xcodegen generate
          cd ..
          VERSION=$(git describe --tags --abbrev=0 | sed 's/^v//')
          xcodebuild -project ClaudeCron/ClaudeCron.xcodeproj \
            -scheme ClaudeCron \
            -configuration Release \
            -derivedDataPath build/derived \
            -destination "platform=macOS" \
            MARKETING_VERSION="$VERSION" \
            CURRENT_PROJECT_VERSION="$VERSION" \
            build

          # Assemble .app bundle
          APP_SRC=$(find build/derived -name "Claude Cron.app" -type d | head -1)
          mkdir -p build/release
          cp -R "$APP_SRC" "build/release/Claude Cron.app"

      - name: Code sign
        run: |
          IDENTITY="Developer ID Application: SPRL Losson (427N276E3Q)"
          APP="build/release/Claude Cron.app"

          # Sign all nested binaries (Sparkle framework components) first
          find "$APP/Contents/Frameworks" -type f -perm +111 | while read binary; do
            codesign --force --options runtime \
              --sign "$IDENTITY" --timestamp "$binary" || true
          done

          # Sign XPC services
          find "$APP/Contents/Frameworks" -name "*.xpc" -type d | while read xpc; do
            codesign --force --options runtime \
              --sign "$IDENTITY" --timestamp "$xpc"
          done

          # Sign embedded apps (Sparkle Updater.app)
          find "$APP/Contents/Frameworks" -name "*.app" -type d | while read app; do
            codesign --force --options runtime \
              --sign "$IDENTITY" --timestamp "$app"
          done

          # Sign the framework itself
          find "$APP/Contents/Frameworks" -name "*.framework" -type d | while read fw; do
            codesign --force --options runtime \
              --sign "$IDENTITY" --timestamp "$fw"
          done

          # Sign the main app bundle
          codesign --force --options runtime \
            --sign "$IDENTITY" \
            --entitlements ClaudeCron/ClaudeCron/ClaudeCron.entitlements \
            --timestamp "$APP"

      - name: Create DMG
        run: |
          VERSION=$(git describe --tags --abbrev=0 | sed 's/^v//')
          create-dmg \
            --volname "Claude Cron" \
            --volicon "dmg/VolumeIcon.icns" \
            --background "dmg/background.png" \
            --window-pos 200 120 \
            --window-size 660 400 \
            --icon-size 80 \
            --text-size 14 \
            --icon "Claude Cron.app" 180 170 \
            --hide-extension "Claude Cron.app" \
            --app-drop-link 480 170 \
            "build/ClaudeCron-${VERSION}.dmg" \
            "build/release/Claude Cron.app"
          codesign --force --sign "Developer ID Application: SPRL Losson (427N276E3Q)" \
            --timestamp "build/ClaudeCron-${VERSION}.dmg"

      - name: Notarize
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          set +e
          xcrun notarytool submit build/ClaudeCron-*.dmg \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_APP_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait 2>&1 | tee /tmp/notarize.log
          RESULT=$?
          SUBMISSION_ID=$(grep -o '[0-9a-f\-]\{36\}' /tmp/notarize.log | head -1)
          if [ $RESULT -ne 0 ] || grep -q "status: Invalid" /tmp/notarize.log; then
            echo "::error::Notarization failed. Fetching log..."
            if [ -n "$SUBMISSION_ID" ]; then
              xcrun notarytool log "$SUBMISSION_ID" \
                --apple-id "$APPLE_ID" \
                --password "$APPLE_APP_PASSWORD" \
                --team-id "$APPLE_TEAM_ID" \
                /tmp/notarize-log.json 2>/dev/null
              cat /tmp/notarize-log.json 2>/dev/null || echo "Could not fetch log"
            fi
            exit 1
          fi
          xcrun stapler staple build/ClaudeCron-*.dmg

      - name: Sign update with Sparkle EdDSA
        env:
          SPARKLE_PRIVATE_KEY: ${{ secrets.SPARKLE_PRIVATE_KEY }}
        run: |
          VERSION=$(git describe --tags --abbrev=0 | sed 's/^v//')
          DMG="build/ClaudeCron-${VERSION}.dmg"

          # Find Sparkle's sign_update tool from the resolved SPM package
          SIGN_UPDATE=$(find build/derived -name "sign_update" -type f | head -1)
          if [ -z "$SIGN_UPDATE" ]; then
            # Fallback: download Sparkle release and use its sign_update
            curl -sL "https://github.com/sparkle-project/Sparkle/releases/latest/download/Sparkle-2.7.0.tar.xz" -o /tmp/sparkle.tar.xz
            mkdir -p /tmp/sparkle && tar -xf /tmp/sparkle.tar.xz -C /tmp/sparkle
            SIGN_UPDATE="/tmp/sparkle/bin/sign_update"
          fi

          # Generate EdDSA signature
          SIGNATURE=$("$SIGN_UPDATE" "$DMG" --ed-key-file <(echo "$SPARKLE_PRIVATE_KEY") 2>/dev/null || echo "$SPARKLE_PRIVATE_KEY" | "$SIGN_UPDATE" "$DMG" -f -)
          echo "SPARKLE_SIGNATURE=${SIGNATURE}" >> "$GITHUB_ENV"
          echo "DMG_SIZE=$(stat -f%z "$DMG")" >> "$GITHUB_ENV"
          echo "RELEASE_VERSION=${VERSION}" >> "$GITHUB_ENV"

      - name: Update appcast.xml
        run: |
          VERSION="${RELEASE_VERSION}"
          DMG_URL="https://github.com/plosson/ClaudeCron/releases/download/v${VERSION}/ClaudeCron-${VERSION}.dmg"
          DATE=$(date -R)

          python3 -c "
          import sys
          appcast = open('appcast.xml').read()
          item = '''        <item>
                  <title>Version ${VERSION}</title>
                  <pubDate>${DATE}</pubDate>
                  <sparkle:version>${VERSION}</sparkle:version>
                  <sparkle:shortVersionString>${VERSION}</sparkle:shortVersionString>
                  <sparkle:minimumSystemVersion>14.0</sparkle:minimumSystemVersion>
                  <enclosure
                      url=\"${DMG_URL}\"
                      ${SPARKLE_SIGNATURE}
                      type=\"application/octet-stream\" />
              </item>'''
          appcast = appcast.replace('</channel>', item + '\n    </channel>')
          open('appcast.xml', 'w').write(appcast)
          "

      - name: Commit appcast.xml
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # Save the updated appcast before switching branches
          cp appcast.xml /tmp/appcast.xml
          git fetch origin main
          git checkout main
          cp /tmp/appcast.xml appcast.xml
          git add appcast.xml
          git commit -m "chore: update appcast.xml for v${RELEASE_VERSION}" || true
          git push origin main

      - name: Upload artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ClaudeCron-dmg
          path: build/ClaudeCron-*.dmg

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: build/ClaudeCron-*.dmg
