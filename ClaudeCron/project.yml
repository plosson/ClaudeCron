name: ClaudeCron
options:
  bundleIdPrefix: com.claudecron
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "16.0"
  createIntermediateGroups: true

targets:
  ClaudeCron:
    type: application
    platform: macOS
    sources:
      - ClaudeCron
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.claudecron.app
        PRODUCT_NAME: Claude Cron
        PRODUCT_MODULE_NAME: ClaudeCron
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_VERSION: "5.9"
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        INFOPLIST_FILE: ""
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_LSApplicationCategoryType: "public.app-category.developer-tools"
        INFOPLIST_KEY_NSHighResolutionCapable: YES
        CODE_SIGN_ENTITLEMENTS: "ClaudeCron/ClaudeCron.entitlements"
    scheme:
      testTargets:
        - ClaudeCronTests

  ClaudeCronTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - ClaudeCronTests
    dependencies:
      - target: ClaudeCron
    settings:
      base:
        SWIFT_VERSION: "5.9"
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        GENERATE_INFOPLIST_FILE: YES
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/Claude Cron.app/Contents/MacOS/Claude Cron"
        BUNDLE_LOADER: "$(TEST_HOST)"
