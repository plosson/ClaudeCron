name: ClaudeCron
options:
  bundleIdPrefix: com.claudecron
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "16.0"
  createIntermediateGroups: true

packages:
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle
    from: "2.7.0"

targets:
  ClaudeCron:
    type: application
    platform: macOS
    sources:
      - ClaudeCron
    dependencies:
      - package: Sparkle
    info:
      path: ClaudeCron/Info.plist
      properties:
        LSApplicationCategoryType: "public.app-category.developer-tools"
        NSHighResolutionCapable: true
        SUPublicEDKey: "A/PM3ogaVd5PCLKDB/mdZCsd86Y8d/TBPryAcn0F1t8="
        SUFeedURL: "https://raw.githubusercontent.com/plosson/ClaudeCron/main/appcast.xml"
        SUEnableAutomaticChecks: true
        SUScheduledCheckInterval: 86400
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.claudecron.app
        PRODUCT_NAME: Claude Cron
        PRODUCT_MODULE_NAME: ClaudeCron
        MARKETING_VERSION: "0.2.0"
        CURRENT_PROJECT_VERSION: "0.2.0"
        SWIFT_VERSION: "5.9"
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        CODE_SIGN_ENTITLEMENTS: "ClaudeCron/ClaudeCron.entitlements"
    scheme:
      testTargets:
        - ClaudeCronTests

  ClaudeCronTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - ClaudeCronTests
    dependencies:
      - target: ClaudeCron
    settings:
      base:
        SWIFT_VERSION: "5.9"
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        GENERATE_INFOPLIST_FILE: YES
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/Claude Cron.app/Contents/MacOS/Claude Cron"
        BUNDLE_LOADER: "$(TEST_HOST)"
